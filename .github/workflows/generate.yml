name: Generate daily briefing

on:
  schedule:
    - cron: '0 6 * * 1-5'  # 6am UTC, Monday–Friday
  workflow_dispatch:        # allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m generator.client

      - name: Commit draft
        run: |
          git config user.name "skald-bot"
          git config user.email "skald-bot@users.noreply.github.com"
          git add -f output/
          git diff --cached --quiet || git commit -m "Generate briefing $(date +%Y-%m-%d)"
          git push
