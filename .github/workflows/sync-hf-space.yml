name: Sync to HuggingFace Space

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'generator/**'
      - 'ingester/**'
      - 'prompts/**'
      - 'beats/**'
      - 'requirements.txt'
      - 'hf-readme.md'

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push to HuggingFace Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://nick385:${HF_TOKEN}@huggingface.co/spaces/nick385/skald hf-deploy

          # Clear everything except .git
          find hf-deploy -mindepth 1 -maxdepth 1 -not -name '.git' -exec rm -rf {} +

          # Copy source files
          cp -r dashboard hf-deploy/
          cp -r generator hf-deploy/
          cp -r ingester hf-deploy/
          cp -r prompts hf-deploy/
          cp -r beats hf-deploy/
          cp requirements.txt hf-deploy/

          cp hf-readme.md hf-deploy/README.md

          cd hf-deploy
          git add -A
          git diff --staged --quiet || git commit -m "Sync from GitHub (${{ github.sha }})"
          git push
